name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  sync-common:
    name: Sync common-update
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync common-update.md to core and utils
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          echo "Comparing $BEFORE → $AFTER"
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" || git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -q "^packages/common/"; then
            TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
            echo "$TIMESTAMP" > packages/core/common-update.md
            echo "$TIMESTAMP" > packages/utils/common-update.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add packages/core/common-update.md packages/utils/common-update.md
            git commit -m "feat: update common-update.md in core and utils [skip ci]"
            git push origin main
          else
            echo "No changes in packages/common, skipping."
          fi

  release-please:
    name: Release Please
    needs: sync-common
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish & Deploy
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: pnpm -r publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload SKILL.md assets to releases
        run: |
          echo '${{ needs.release-please.outputs.paths_released }}' | jq -r '.[]' | while read -r path; do
            name=$(node -p "require('./$path/package.json').name")
            version=$(node -p "require('./$path/package.json').version")
            tag="${name}@${version}"
            echo "Uploading SKILL.md for $tag"
            for skill in "$path"/skills/*/SKILL.md; do
              [ -f "$skill" ] || continue
              gh release upload "$tag" "$skill" --clobber || true
            done
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docs
        run: pnpm docs:build

      - name: Deploy to Netlify
        run: |
          cd apps/site && pnpm netlify deploy \
            --prod \
            --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NFP_TOKEN }}
