name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout for common-update
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync common-update.md to core and utils
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          echo "Comparing $BEFORE → $AFTER"
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" || git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -q "^packages/common/"; then
            TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
            COMMIT_MSG=$(git log -1 --pretty=%s)
            echo "$TIMESTAMP" > packages/core/common-update.md
            echo "$TIMESTAMP" > packages/utils/common-update.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add packages/core/common-update.md packages/utils/common-update.md
            git commit -m "feat: update common-update.md in core and utils [skip ci]"
            git push origin main
          else
            echo "No changes in packages/common, skipping."
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Pull latest main
        run: git pull origin main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Release
        run: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

      - name: Build docs
        if: success()
        run: pnpm docs:build

      - name: Build docs & Deploy docs to Netlify
        if: success()
        uses: jsmrcaga/action-netlify-deploy@master
        with:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NFP_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_DEPLOY_TO_PROD: true
          build_directory: doc_build
          install_command: "echo Skipping installing the dependencies"
          build_command: "echo Skipping building the web files"
